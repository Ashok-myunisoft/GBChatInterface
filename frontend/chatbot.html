<html lang="en">
<head>
<meta charset="UTF-8">
<title>GB Pack Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body { 
        font-family: Arial, sans-serif; background:#f2f2f2; 
        display:flex; justify-content:center; align-items:center; height:100vh; 
    }
    .chat-container {
        width: 450px; background:#fff; border-radius:10px; 
        box-shadow:0 0 12px rgba(0,0,0,0.15);
        overflow:hidden; display:flex; flex-direction:column;
    }
    .header {
        background:#1a73e8; color:#fff; padding:15px; font-size:20px; text-align:center;
        font-weight:bold;
    }
    .chat-box {
        height:430px; overflow-y:auto; padding:15px;
        background:#fafafa;
    }
    .msg {
        margin:8px 0; padding:10px 14px; border-radius:8px; max-width:80%;
        line-height:1.4; font-size:14px;
    }
    .user { background:#d1eaff; align-self:flex-end; }
    .bot { background:#e8e8e8; align-self:flex-start; }
    .input-area {
        display:flex; border-top:1px solid #ccc;
    }
    input {
        flex:1; padding:12px; border:none; outline:none; font-size:15px;
    }
    button {
        width:100px; background:#1a73e8; color:#fff; border:none;
        font-size:15px; cursor:pointer; transition:0.3s;
    }
    button:hover { background:#0c57be; }
</style>

</head>
<body>

<div class="chat-container">

    <div class="header">💬 GoodBooks Pack Chatbot</div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type message... (Ex: Create pack)">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
    const API_URL = "http://localhost:8000/gbaiapi/chat_Interface";   // Change if hosted externally
    const LOGIN_HEADER = `<?php echo ''; ?>`; // optional for FE login later

    function appendMessage(text, type){
        let box = document.getElementById("chatBox");
        let div = document.createElement("div");
        div.className = "msg " + type;
        div.textContent = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage(){
        let msg = document.getElementById("userInput").value.trim();
        if(!msg) return;

        appendMessage(msg, "user");
        document.getElementById("userInput").value = "";

        try {
            let res = await fetch(API_URL, {
                method:"POST",
                headers:{ "Content-Type":"application/json", "Login": "" },
                body: JSON.stringify({ message:msg })
            });

            let data = await res.json();
            appendMessage(data.message || "No response", "bot");

        } catch(err){
            appendMessage("Error connecting to server ❌", "bot");
            console.error(err);
        }
    }

</script>

</body>
</html>
